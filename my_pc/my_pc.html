<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="img" href="img/smiley_favicon_darktheme.png" sizes="16x16">
  <title>FLEP_OS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(90deg, #ff9a9e, #fecfef);
      height: 100vh;
      overflow: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M0,0 L0,12 L4,8 L7,14 L9,13 L6,7 L12,7 Z" fill="white" stroke="black"/></svg>'), auto;
    }

    .desktop {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .window {
      position: absolute;
      background: #c0c0c0;
      border: 2px solid;
      border-color: #dfdfdf #808080 #808080 #dfdfdf;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      min-width: 300px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }

    .window.active {
      z-index: 1000;
    }

    .title-bar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      padding: 3px 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: move;
      user-select: none;
    }

    .title-bar.inactive {
      background: linear-gradient(to right, #808080, #a0a0a0);
    }

    .title-text {
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .window-icon {
      width: 16px;
      height: 16px;
    }

    .title-buttons {
      display: flex;
      gap: 2px;
    }

    .title-button {
      width: 16px;
      height: 14px;
      background: #c0c0c0;
      border: 1px solid;
      border-color: #dfdfdf #000 #000 #dfdfdf;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
    }

    .title-button:active {
      border-color: #000 #dfdfdf #dfdfdf #000;
    }

    .window-content {
      flex: 1;
      padding: 15px;
      background: white;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #808080;
    }

    .scrollable-window-content {
      flex: 1;
      padding: 15px;
      background: white;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #808080;
      max-height: 500px;
    }

    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, transparent 50%, #808080 50%, #808080 100%);
    }

    .desktop-icons {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 5px;
      width: 80px;
    }

    .desktop-icon:hover {
      background: rgba(255,255,255,0.2);
    }

    .icon-image {
      width: 48px;
      height: 48px;
      border: 2px solid white;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .icon-label {
      color: white;
      font-size: 12px;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .taskbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: #c0c0c0;
      border-top: 2px solid #dfdfdf;
      display: flex;
      align-items: center;
      padding: 0 5px;
      gap: 5px;
    }

    .start-button {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #dfdfdf #000 #000 #dfdfdf;
      padding: 4px 15px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .start-button:active {
      border-color: #000 #dfdfdf #dfdfdf #000;
    }

    .clock {
      margin-left: auto;
      padding: 4px 10px;
      border: 1px inset;
      font-size: 13px;
    }

    h2 {
      color: #000080;
      margin-bottom: 10px;
      font-size: 18px;
    }

    p {
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .button {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #dfdfdf #000 #000 #dfdfdf;
      padding: 5px 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    .button:active {
      border-color: #000 #dfdfdf #dfdfdf #000;
    }

    img {
      max-width: 100%;
      height: auto;
      border: 1px solid #808080;
      margin: 10px 0;
    }
  </style>

  <script src="js/sparkles.js"></script>
  <script src="js/smoke.js"></script>

</head>
<body>
  <div class="desktop">
    <div class="desktop-icons">
      <div class="desktop-icon" onclick="openWindow('about')">
        <div class="icon-image"><img src="img/laptop.png" alt=""></div>
        <div class="icon-label">About.exe</div>
      </div>
      <!-- <div class="desktop-icon" onclick="openWindow('gallery')">
        <div class="icon-image">🖼️</div>
        <div class="icon-label">Gallery.exe</div>
      </div> -->
      <!-- <div class="desktop-icon" onclick="openWindow('music')">
        <div class="icon-image">🎵</div>
        <div class="icon-label">Music.exe</div>
      </div> -->
      <div class="desktop-icon" onclick="openWindow('cool_links', size = '900px', scrollable = true, resizable = false)">
        <div class="icon-image">🔗</div>
        <div class="icon-label">Cool_links.txt</div>
      </div>
      <div class="desktop-icon" onclick="openWindow('settings', scrollable = true)">
        <div class="icon-image">⚙️</div>
        <div class="icon-label">Settings.exe</div>
      </div>
    </div>

    <div class="taskbar">
      <div class="start-button">Start</div>
      <div class="clock" id="clock">12:00 PM</div>
    </div>
  </div>

  <script>
    let zIndex = 100;
    let activeWindow = null;

    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 || 12;
      document.getElementById('clock').textContent = `${displayHours}:${minutes} ${ampm}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    const windowTemplates = {
      intro: {
        title: 'Hey !',
        icon: 'ℹ️',
        content: `
          <h2>Welcome to FlepOS</h2>
          <p>Feel free to explore my computer !</p>
          <p>Don't mess anything up, I haven't backed it since 2001. </p>
          <button class="button" onclick="alert('Damn... Already ? You broke the cursor');start_smoke()">Mess everything up</button>
        `
      },
      about: {
        title: 'About',
        icon: 'ℹ️',
        content: `
          <h2>Who am I ?</h2>
          <p>Creative person, interested in science and arts, I try my best to link the two in a way where I can see growth. </p>
          <p></p>
          <h2>What is this ?</h2>
          <p>This is my personal computer, or at least a virtual representation of it. It's a place where I gather links, files, and projects that I find interesting or useful.</p>
          
        `
      },
      cool_links: {
        title: 'Cool_links.txt',
        icon: '📄',
        content: `
          <h1>Cool links.txt</h1>
            <p>Here are some cool and interesting links to explore:</p>
            
            <h2>WEB</h2>
                    <a href="https://gifypet.neocities.org/">Gify pets</a> - It's like Tamagotchi, but with GIFs!<br>
                    <a href="https://mf2fm.com/rv/dhtmlshootingstar.php">RV's html assets</a> - A collection of retro web graphics and effects<br>

            <br><h2>ART</h2>
                    <a href="https://karlsims.com/rdtool.html?s=4JcBVogs1vxlD8ahdOm4">RD tool</a> - Create trippy abstract evolving visuals <br>
                    <a href="https://ditherit.com">Dither it</a> - Generate some dithering of images <br>
                    <a href="https://www.floguo.com/notes/links-mar-2026">Flo guo, blog d'une bosseuse</a> - Très pointu tech, avec une note créa et de l'âme, rare intersection, à creuser <br> 
                

            <br><h2>MUSIC</h2>
                    <a href="https://nnty.fun/downloads/other/90ssamplecds/">90s sample cds</a> - Sample CDs from the 90s. DIGGING REQUIRED <br>
                

            <br><h2>Utilities</h2>
                    <a href="https://www.timeanddate.com/worldclock/converter.html">Time and Date</a> - Time zone converter and world clock<br>
                    

            <br><h2>MISC</h2>
                    <a href="https://typatone.com/">Typatone</a> - Type a word and hear it<br>
                    <a href="https://patorjk.com/software/taag/#p=display&f=Graffiti&t=Type+Something+&x=none&v=4&h=4&w=80&we=false">Text to ascii</a> - Stylize text with ascii<br>
                    
            <br><h2>DIY</h2>
                    <a href="https://andykong.org/projects/yearofoutput">Andy Kong</a> - A maker's site that could inspire something ?<br>
                    
            <br><h2>Cool sites</h2>
                    <a href="https://www.aquarium.ru/en">Aquarium</a> - Crazy site for a band, scrollable 3D graphics like crazy<br>
                    <a href="https://melonking.net/">Melonkings</a> - Creative site, will you meet Ozwomp ?<br>
                    <a href="https://momg.neocities.org/">GIF gallery</a> - Let's wander through the gif gallery<br>
            
            <br><h2>Indie web</h2>
                    <a href="https://thecreativeindependent.com">The creative independent</a> - Nice ressource, interesting profile, good tips, good guidance. <br>
                    <a href="https://petrapixel.neocities.org/">Petrapixel</a> - Cool site by a cool person from neocties, useful coding ressources <br>
                    <a href="https://pluto22.neocities.org/">Pluto22</a> - I like the lightheartedness of the site, some very simple HTML, a few nice concepts. <br>
                    <a href="">qsdf</a> - qsdf <br>

            
          </p>
          
        `
      },
      settings: {
        title: 'Settings',
        icon: '⚙️',
        content: `
          <h2>Desktop Settings</h2>
          
          <div style="margin: 20px 0;">
            <h3 style="color: #000080; font-size: 14px; margin-bottom: 10px;">Background Theme</h3>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
              <button class="button" onclick="changeBackground('gradient1')" style="background: color: white;">Purple Dream</button>
              <button class="button" onclick="changeBackground('gradient2')" style="background: color: white;">Sunset Pink</button>
            </div>
          </div>

          <div style="margin: 20px 0; border-top: 2px groove #808080; padding-top: 20px;">
            <h3 style="color: #000080; font-size: 14px; margin-bottom: 10px;">Cursor Style</h3>
            <div style="display: flex; flex-direction: column; gap: 8px;">
              <label style="display: flex; align-items: center; gap: 10px;">
                <input type="radio" name="cursor" value="default" onchange="changeCursor('default')" checked>
                <span>Classic Arrow</span>
              </label>
              <label style="display: flex; align-items: center; gap: 10px;">
                <input type="radio" name="cursor" value="crosshair" onchange="changeCursor('crosshair')">
                <span>Crosshair</span>
              </label>

              <button class="button" onclick="start_sparkles()" style="background: linear-gradient(90deg,rgba(234, 253, 29, 1) 12%, rgba(224, 187, 0, 1) 59%, rgba(255, 248, 105, 1) 100%);">Start Sparkles</button>
              <button class="button" onclick="stop_sparkles()" style="background: linear-gradient(90deg,rgba(0, 0, 0, 1) 0%, rgba(224, 0, 0, 1) 37%, rgba(224, 0, 0, 1) 69%, rgba(0, 0, 0, 1) 100%);">Stop Sparkles</button>

            </div>
          </div>

          <div style="margin: 20px 0; border-top: 2px groove #808080; padding-top: 20px;">
            <button class="button" onclick="resetSettings()">Reset to Default</button>
          </div>
        `
      }
    };

    function openWindow(type, size = '400px', scrollable = false, resizable = false, left = 100, top = 50) {
      const template = windowTemplates[type];
      if (!template) return;

      const existingWindow = document.querySelector(`[data-window-type="${type}"]`);
      if (existingWindow) {
        focusWindow(existingWindow);
        return;
      }

      const win = document.createElement('div');
      win.className = 'window active';
      win.setAttribute('data-window-type', type);
      win.style.left = `${left + Math.random() * 200}px`;
      win.style.top = `${top + Math.random() * 150}px`;

      win.style.width = size;
      win.style.zIndex = ++zIndex;

      win.innerHTML = `
        <div class="title-bar">
          <div class="title-text">
            <span class="window-icon">${template.icon}</span>
            ${template.title}
          </div>
          <div class="title-buttons">
            <div class="title-button" onclick="minimizeWindow(this)">_</div>
            <div class="title-button" onclick="closeWindow(this)">×</div>
          </div>
        </div>
        <div class="${scrollable === true ? 'scrollable-window-content' : 'window-content'}">
          ${template.content}
        </div>
        ${resizable === true ? '<div class="resize-handle"></div>' : ''}
      `;

      document.querySelector('.desktop').appendChild(win);
      makeWindowDraggable(win);
      if (resizable){
        makeWindowResizable(win);
      }
      focusWindow(win);
    }

    function makeWindowDraggable(win) {
      const titleBar = win.querySelector('.title-bar');
      let pos = { x: 0, y: 0, startX: 0, startY: 0 };

      titleBar.addEventListener('mousedown', dragStart);

      function dragStart(e) {
        focusWindow(win);
        pos.startX = e.clientX;
        pos.startY = e.clientY;
        pos.x = win.offsetLeft;
        pos.y = win.offsetTop;
        
        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
      }

      function dragMove(e) {
        const dx = e.clientX - pos.startX;
        const dy = e.clientY - pos.startY;
        win.style.left = `${pos.x + dx}px`;
        win.style.top = `${pos.y + dy}px`;
      }

      function dragEnd() {
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
      }

      win.addEventListener('mousedown', () => focusWindow(win));
    }

    function makeWindowResizable(win) {
      const resizeHandle = win.querySelector('.resize-handle');
      let startX, startY, startWidth, startHeight;

      resizeHandle.addEventListener('mousedown', initResize);

      function initResize(e) {
        e.stopPropagation();
        startX = e.clientX;
        startY = e.clientY;
        startWidth = parseInt(window.getComputedStyle(win).width, 10);
        startHeight = parseInt(window.getComputedStyle(win).height, 10);
        
        document.addEventListener('mousemove', doResize);
        document.addEventListener('mouseup', stopResize);
      }

      function doResize(e) {
        const newWidth = startWidth + (e.clientX - startX);
        const newHeight = startHeight + (e.clientY - startY);
        
        if (newWidth > 300) {
          win.style.width = newWidth + 'px';
        }
        if (newHeight > 200) {
          win.style.height = newHeight + 'px';
          
        }
      }

      function stopResize() {
        document.removeEventListener('mousemove', doResize);
        document.removeEventListener('mouseup', stopResize);
      }
    }

    function focusWindow(win) {
      if (activeWindow) {
        activeWindow.classList.remove('active');
        activeWindow.querySelector('.title-bar').classList.add('inactive');
      }
      win.style.zIndex = ++zIndex;
      win.classList.add('active');
      win.querySelector('.title-bar').classList.remove('inactive');
      activeWindow = win;
    }

    function closeWindow(btn) {
      btn.closest('.window').remove();
    }

    function minimizeWindow(btn) {
      btn.closest('.window').style.display = 'none';
    }

    // Background change function
    function changeBackground(gradient) {
      const gradients = {
        gradient1: 'linear-gradient(135deg, #000080, #0000CD, #9000FF, #4162E1)',
        gradient2: 'linear-gradient(90deg, #ff9a9e, #fecfef)',
      };
      if ('default' === gradient) {
        gradient = 'gradient2';
        return;
      }
      document.body.style.background = gradients[gradient];
    }

    // Cursor change function
    function changeCursor(cursorType) {
      if (cursorType === 'default') {
        document.body.style.cursor = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\"><path d=\"M0,0 L0,12 L4,8 L7,14 L9,13 L6,7 L12,7 Z\" fill=\"white\" stroke=\"black\"/></svg>'), auto";
      } else if (cursorType === 'sparkles') {start_sparkles();
      } else {
        document.body.style.cursor = cursorType;

      }
    }

    // Reset settings function
    function resetSettings() {
      changeBackground('default');
      changeCursor('default');
      document.querySelector('input[name="cursor"][value="default"]').checked = true;
    }

    // Open welcome window on load
    setTimeout(() => openWindow('intro', '500px', false, false, 500, 200), 2000);
  </script>
</body>
</html>
