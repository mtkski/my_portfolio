###########
# site.title

title: flep's blog
description: flep's blog, yee yee
url: "" # the base hostname & protocol for your site
# host: 0.0.0.0


#########################
# more settings

plugins:
  - jekyll-redirect-from

whitelist:
  - jekyll-redirect-from

markdown: kramdown

compress_html:
  clippings: all
  comments: [""]
  endings: [html, head, body, li, dt, dd, rt, rp, optgroup, option, colgroup, caption, thead, tbody, tfoot, tr, td, th]
  profile: false
  blanklines: false
  ignore:
    envs: []

collections:
  my_tags:
    output: true
    permalink: /tagged/:slug/
  notes:
    output: true
    permalink: /notes/:slug/
  technical:
    output: true
    permalink: /technical/:slug/

defaults:
  - scope:
      path: ""
      type: my_tags
    values:
      layout: tagged
  - scope:
      path: "_notes"
    values:
      layout: note
  - scope:
      path: "_technical"
    values:
      layout: note

baseurl: "/blogg"
permalink: /blog/:slug/
timezone: Europe/Brussels
future: true

exclude:
- README.md
- LICENSE.md

exclude: [vendor]

Blog: /blog/
Life: /life
Technical: /technical/
